<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi Yharita</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background: #ffe6f0;
    margin-top: 100px;
}

h1{
    font-size: 28px;
}

button{
    font-size: 22px;
    padding: 12px 25px;
    margin: 15px;
    border: none;
    border-radius: 10px;
}

#si{
    background-color: #ff4d6d;
    color: white;
}

#no{
    background-color: #999;
    color: white;
    position: absolute;
}

#mensaje{
    font-size: 24px;
    margin-top: 40px;
    color: #ff4d6d;
}
</style>
</head>

<body>


<h1>¿Me extrañas?</h1>
<h4>No vas a poder decir que no, te aviso jasjas</h4>

<button id="si" onclick="respuesta()">Sí</button>
<button id="no" ontouchstart="mover()" onclick="mover()">No</button>

<p id="mensaje"></p>
<h5>Depaso dejo la foto que mas te gusto</h5>
<img src="img/WhatsApp Image 2026-03-25 at 10.31.24 PM.jpeg" alt="100" height="150">
<script>
function respuesta(){
    document.getElementById("mensaje").innerText = "Yo también te extraño Yharita ❤️";
}

function mover(){
    let boton = document.getElementById("no");

    let ancho = window.innerWidth - boton.offsetWidth;
    let alto = window.innerHeight - boton.offsetHeight;

    let x = Math.random() * ancho;
    let y = Math.random() * alto;

    boton.style.left = x + "px";
    boton.style.top = y + "px";
}
</script>

</body>
</html>
